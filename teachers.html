<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesores — Sistema Académico</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout" id="app-layout">
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="menu-toggle" class="btn btn-secondary btn-sm">☰</button>
          <h1>Profesores</h1>
          <p>Registro y gestión de docentes</p>
        </div>
        <div class="header-right">
          <button class="btn btn-primary" onclick="openCreateTeacher()">+ Nuevo Profesor</button>
        </div>
      </header>

      <main class="page-content">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Listado de Profesores</div>
              <div class="card-subtitle" id="teachers-count">Cargando...</div>
            </div>
            <div class="toolbar-right">
              <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="form-control" id="search-teachers" placeholder="Buscar profesor...">
              </div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Documento</th>
                  <th>Materias asignadas</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="teachers-tbody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="teacher-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="teacher-modal-title">Nuevo Profesor</span>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <form id="teacher-form" onsubmit="return false">
          <input type="hidden" id="teacher-id">
          <div class="form-group">
            <label class="form-label">Nombre completo <span class="required">*</span></label>
            <input type="text" id="teacher-nombre" class="form-control" placeholder="Ej: María González">
          </div>
          <div class="form-group">
            <label class="form-label">Documento / ID <span class="required">*</span></label>
            <input type="text" id="teacher-doc" class="form-control" placeholder="Ej: 87654321">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('teacher-modal')">Cancelar</button>
        <button class="btn btn-primary" id="btn-save-teacher" onclick="saveTeacher()">💾 Guardar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/teachers.js"></script>
  <script>
    requireAdmin();
    renderSidebar("teachers");
    initMobileMenu();
    loadTeachers();
    setupTableSearch("search-teachers", "teachers-tbody");

    const origLoad = loadTeachers;
    window.loadTeachers = async function() {
      await origLoad();
      document.getElementById("teachers-count").textContent =
        `${getAllTeachers().length} profesores registrados`;
      setupTableSearch("search-teachers", "teachers-tbody");
    };
    loadTeachers();
  </script>
</body>
</html>
